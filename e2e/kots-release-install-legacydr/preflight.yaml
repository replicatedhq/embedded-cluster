apiVersion: troubleshoot.replicated.com/v1beta1
kind: Preflight
metadata:
  name: preflight-checks
spec:
  collectors:
    - clusterInfo: {}
    - clusterResources: {}
  analyzers:
    - customResourceDefinition:
        customResourceDefinitionName: clusterconfigs.k0s.k0sproject.io
        checkName: K0s ClusterConfig CRD exists
        outcomes:
          - fail:
              message: The K0s ClusterConfig CRD is not installed in the cluster.
          - pass:
              message: The K0s ClusterConfig CRD is installed in the cluster.
